# Build provider artifacts for every branch so release packaging failures are
# detected before a version tag is created.
name: Build

on: [workflow_dispatch, push]

permissions:
  contents: read

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install Aqua-managed tools
        uses: aquaproj/aqua-installer@a78671ff723534c879a9c8aa62c99a3a05dddb49 # v4.0.5
        with:
          aqua_version: v2.61.0
          aqua_opts: ''
        env:
          AQUA_GITHUB_TOKEN: ${{ github.token }}

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Run GoReleaser snapshot build
        run: aqua -c aqua/aqua.yml exec -- just build-snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
