name: Vulnerability Scan

on:
  pull_request:
    branches: [main]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'vendor/**'
      - 'justfile'
      - 'aqua/**'
      - '.github/workflows/vuln.yml'
  schedule:
    # Weekly, Monday 06:00 UTC.
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: aquaproj/aqua-installer@a78671ff723534c879a9c8aa62c99a3a05dddb49 # v4.0.5
        with:
          aqua_version: v2.61.0
          aqua_opts: ''
        env:
          AQUA_GITHUB_TOKEN: ${{ github.token }}
      - run: aqua -c aqua/aqua.yml exec -- just vuln
